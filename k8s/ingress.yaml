apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-voice-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Uncomment for TLS via cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: voice-agent.yourdomain.com     # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-voice-agent
                port:
                  number: 80
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - voice-agent.yourdomain.com
  #     secretName: ai-voice-agent-tls
