apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-voice-agent
  labels:
    app: ai-voice-agent
spec:
  replicas: 1               # Keep at 1 — in-memory conversation history is per-process
  selector:
    matchLabels:
      app: ai-voice-agent
  template:
    metadata:
      labels:
        app: ai-voice-agent
    spec:
      containers:
        - name: ai-voice-agent
          image: ghcr.io/YOUR_GITHUB_USERNAME/ai-voice-agent:latest
          ports:
            - containerPort: 8000
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-voice-agent-secrets
                  key: GROQ_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-voice-agent-secrets
                  key: GOOGLE_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
